project:
  name: spec-driven-demo
  version: 0.1.0
  roots:
    - .

agents:
  defaults:
    max_tokens: 4000
    model: claude-3-5-sonnet-20241022

# Multi-directory spec resolution:
# Specs are searched in order — first match wins.
paths:
  specDirs:
    - .sdd-spec/specs       # Sdd-OpenSpec (Mutable, working directory)
    - vendor/platform/specs  # Platform Source (Read-only reference)
    - .agentic/spec         # Agentic native specs (fallback)
  openSpecDir: .sdd-spec/changes  # Sdd-OpenSpec change lifecycle
  contextDirs:
    - .sdd-spec/context
    - vendor/platform/context

workflow:
  validators:
    - context-check
    - task-scope
