project:
  name: agent-aware-example
  version: 0.1.0
  roots:
    - .

agents:
  defaults:
    max_tokens: 4000
    model: claude-3-5-sonnet-20241022

# Skills that are "agent-aware" can use these paths to find context
paths:
  specDirs:
    - .sdd-spec/specs
    - .agentic/spec
  openSpecDir: .sdd-spec/changes
  contextDirs:
    - .agentic/context

workflow:
  validators:
    - context-check
